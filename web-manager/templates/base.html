<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/import.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='album/favicon.ico') }}">
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
<nav class="navbar navbar-expand-md fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/"><img src="{{ url_for('static', filename='album/logo.png') }}" alt="Club*Nix Logo"/></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar" aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                        <i class="bi bi-house-door"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'manager.manage' %}active{% endif %}" href="{{ url_for('manager.manage') }}">
                        <i class="bi bi-sliders"></i> Manage
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint in ('manager.create',) %}active{% endif %}" href="{{ url_for('manager.create') }}">
                        <i class="bi bi-plus-circle"></i> Create
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint in ('manager.backup', 'manager.backup_download', 'manager.backup_restore') %}active{% endif %}" href="{{ url_for('manager.backup') }}">
                        <i class="bi bi-archive"></i> Backup
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'auth.users' %}active{% endif %}" href="{{ url_for('auth.users') }}">
                        <i class="bi bi-people"></i> Users
                    </a>
                </li>
            </ul>
            {% if current_user.is_authenticated %}
            <div class="dropdown">
                <button class="navbar-user-btn dropdown-toggle" type="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle"></i> {{ current_user.username }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end navbar-dropdown">
                    <li>
                        <a class="dropdown-item {% if request.endpoint in ('auth.settings', 'auth.totp_setup') %}active{% endif %}"
                           href="{{ url_for('auth.settings') }}">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item dropdown-item--danger"
                           href="{{ url_for('auth.logout') }}">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<div class="fill"></div>
<footer>
    <p id="current-time"></p>
    <p>&copy; Louis GAMBART &mdash; <span id="year"></span></p>
    <script>
        document.getElementById('current-time').textContent = new Date().toLocaleString();
        document.getElementById('year').textContent = new Date().getFullYear().toString();
    </script>
</footer>
</body>
</html>
