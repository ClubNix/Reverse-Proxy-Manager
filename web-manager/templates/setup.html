<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/import.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='album/favicon.ico') }}">
    <title>First-run setup &mdash; Reverse Proxy Manager</title>
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='album/logo.png') }}" alt="Logo" class="auth-logo">
            <h1 class="auth-title">Create admin account</h1>
            <p class="auth-subtitle">No users exist yet. Set up the first account to get started.</p>
        </div>

        {% if error %}
        <div class="alert-modern error" style="margin-bottom: 1.25rem;">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       autocomplete="username" required autofocus
                       placeholder="admin">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="new-password" required
                       placeholder="••••••••">
            </div>
            <div class="field">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       autocomplete="new-password" required
                       placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn--lg btn--full">
                <i class="bi bi-check-lg"></i> Create account
            </button>
        </form>
    </div>
</div>
</body>
</html>
