<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/import.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='album/favicon.ico') }}">
    <title>Two-factor auth &mdash; Reverse Proxy Manager</title>
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-shield-lock auth-icon"></i>
            <h1 class="auth-title">Two-factor authentication</h1>
            <p class="auth-subtitle">Enter the 6-digit code from your authenticator app.</p>
        </div>

        {% if error %}
        <div class="alert-modern error" style="margin-bottom: 1.25rem;">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="field">
                <label for="code">Authentication code</label>
                <input type="text" id="code" name="code"
                       inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                       autocomplete="one-time-code" required autofocus
                       placeholder="000000" class="totp-input">
            </div>
            <button type="submit" class="btn btn-primary btn--lg btn--full">
                <i class="bi bi-check-lg"></i> Verify
            </button>
        </form>

        <a href="{{ url_for('auth.login') }}" class="auth-back">
            <i class="bi bi-arrow-left"></i> Back to login
        </a>
    </div>
</div>
</body>
</html>
